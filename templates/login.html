<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Telecom Pro | Acesso Restrito</title>
    <meta name="theme-color" content="#121212">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #121212; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: #1e1e1e; border: 1px solid #333; border-radius: 15px; box-shadow: 0 10px 30px rgba(13, 110, 253, 0.15); padding: 40px; width: 100%; max-width: 400px; }
        .form-control { background: #2b2b2b; border: 1px solid #444; color: #fff; }
        .form-control:focus { background: #2b2b2b; color: #fff; border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25); }
        .btn-primary { font-weight: bold; padding: 12px; font-size: 1.1rem; border-radius: 8px; }
        .logo-icon { width: 90px; height: 90px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(13, 110, 253, 0.5); }
    </style>
  </head>
  <body>
    <div class="container d-flex justify-content-center">
        <div class="login-card text-center">
            <img src="{{ url_for('static', filename='img/icon.png') }}" alt="Telecom Pro" class="logo-icon rounded-circle">
            <h3 class="mb-4 fw-bold text-primary">Telecom Pro</h3>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} small py-2 fw-bold">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label text-secondary small fw-bold">NOME DE USUÁRIO</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person-fill"></i></span>
                        <input type="text" name="username" class="form-control border-secondary" placeholder="Digite seu login" required autofocus>
                    </div>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label text-secondary small fw-bold">SENHA DE ACESSO</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" name="password" class="form-control border-secondary" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 shadow"><i class="bi bi-box-arrow-in-right me-2"></i> Entrar no Sistema</button>
            </form>
            <div class="mt-4 text-muted small">
                &copy; 2026 Dual Core Solutions
            </div>
        </div>
    </div>
  </body>
</html>
